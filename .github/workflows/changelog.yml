name: Changelog Generator

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog (Tag)
        if: github.ref_type == 'tag'
        uses: orhun/git-cliff-action@v4
        id: git-cliff-tag
        with:
          config: cliff.toml
          args: --verbose --tag ${{ github.ref_name }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate Changelog (Branch)
        if: github.ref_type != 'tag'
        uses: orhun/git-cliff-action@v4
        id: git-cliff-branch
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit and Push CHANGELOG.md
        if: github.ref_type == 'branch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update CHANGELOG.md [skip ci]" && git push)

      - name: Create or Update GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.git-cliff-tag.outputs.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
